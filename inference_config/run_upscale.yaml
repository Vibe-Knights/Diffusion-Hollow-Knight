
fps: 20
old_format: true

model:
  context_len: 4
  cond_channels: 128
  depths: [2, 2, 2, 2]
  channels: [32, 64, 128, 256]
  attn_depths: [False, False, True, True]


trainer:
  actions: ["LEFT","RIGHT","UP","DOWN","JUMP","ATTACK","HEAL"]

paths:
  model_path: world_model/model_weights/model.pth
  first_frame_path: world_model/data_collection/dataset/frames_low_res/0000000.png

inference:
  # --- режим работы ---
  use_upscaler: true       # true → FastVSR upscaler, false → bilinear F.interpolate
  async_mode: true       # true → 3 потока (diffusion / upscaler / UI)

  # --- размер окна вывода (W x H) ---
  display_width: 854
  display_height: 480

  # --- чекпоинт upscaler (относительно корня проекта) ---
  upscaler_checkpoint: upscaler/model_weights/1.6M/model.pth

  # --- архитектура FastUpscaler ---
  upscaler:
    num_feat: 64
    num_blocks: 10
    expansion: 2
    lr_size: [72, 128]   # [H, W]
    hr_size: [288, 512]  # [H, W]

hydra:
  job:
    chdir: false
