paths:
  source_frames: dataset/frames_high_res
  runs_root: runs
  upscaler_run_dir: runs/upscaler

data:
  base_width: 128
  base_height: 72
  scale: 4
  num_workers: 4
  interpolation_mode: bicubic
  target_downscale_mode: bicubic

runtime:
  use_amp: true
  use_compile: true
  latency_budget_ms: 15.0

sharpen:
  method: cas
  amount: 0.8

upscaler:
  model:
    in_channels: 6
    out_channels: 3
    num_feat: 64
    num_blocks: 10
    expansion: 2
    lr_size: ${data.lr_size}
    hr_size: ${data.target_size}
  train:
    epochs: 250
    batch_size: 8
    sequence_length: 5
    patch_size_target: null
    samples_per_epoch: null
    augment_artifacts: true
    ema_decay: 0.999
    grad_clip: 1.0
    callback_period: 1
    rollout_length: 5
    optimizer:
      _target_: torch.optim.AdamW
      lr: 0.0005
      weight_decay: 0.0001
      betas: [0.9, 0.99]
    lr_scheduler:
      _target_: torch.optim.lr_scheduler.CosineAnnealingLR
      T_max: ${upscaler.train.epochs}
      eta_min: 1.0e-06
    validation:
      num_chains: 8
      chain_length: ${upscaler.train.sequence_length}
      gap: 16
      seed: 42
    use_nvof: true
    teacher_forcing:
      start_p: 0
      end_p: 0.4
      ramp_epochs: 120
      delay_epochs: 30
      mode: linear
    loss:
      charbonnier: 1.0
      perceptual: 0.0
      temporal: 0.0
      edge: 0.0
      fft: 0.0
    loss_schedule:
      - from_epoch: 60
        weights:
          perceptual: 0.15
          temporal: 0.05
          edge: 0.1
          fft: 0.05

hydra:
  job:
    chdir: false
